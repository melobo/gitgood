openapi: 3.0.0
info:
  title: GitGood Invoice Processing API
  description: >
    A cloud-based REST API for generating, converting, validating, finalising,
    and downloading UBL 2.1 compliant electronic invoices.
  version: 1.0.0

servers:
  - url: http://3.107.81.173:3000
    description: Production (AWS)

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    SessionHeader:
      in: header
      name: session
      required: true
      schema:
        type: string
      description: Session token returned from login or register

  schemas:
    InvoiceStatus:
      type: string
      enum: ['draft', 'converted', 'validated', 'finalised']
      example: "draft"

    Invoice:
      type: object
      required:
        - invoiceId
        - status
        - buyerName
        - buyerAbn
        - buyerEmail
        - supplierName
        - supplierAbn
        - issueDate
        - paymentDueDate
        - itemsList
        - taxRate
        - taxAmount
        - totalPayable
        - paymentDetails
        - createdAt
        - updatedAt
        - statusHistory
      properties:
        invoiceId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        buyerName:
          type: string
        buyerAbn:
          type: string
        buyerEmail:
          type: string
          format: email
        supplierName:
          type: string
        supplierAbn:
          type: string
        issueDate:
          type: string
          format: date
        paymentDueDate:
          type: string
          format: date
        itemsList:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        taxRate:
          type: number
          example: 0.1
        taxAmount:
          type: number
          description: "Calculated as sum(items) * taxRate"
        totalPayable:
          type: number
          description: "Calculated total including tax"
        paymentDetails:
          type: array
          items:
            $ref: '#/components/schemas/PaymentDetails'
        additionalNotes:
          type: string
          nullable: true
        ublXml:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        finalisedAt:
          type: string
          format: date
          nullable: true
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistoryEntry'

    StatusHistoryEntry:
      type: object
      required: [status, changedAt]
      properties:
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        changedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      properties:
        session:
          type: string

    Item:
      type: object
      required: [itemName, quantity, unitPrice, unitCode, totalPrice]
      properties:
        itemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        unitCode:
          type: string
          description: "(example: ea, kg, hr)"
        totalPrice:
          type: number

    PaymentDetails:
      type: object
      required: [bankName, accountNumber, bsbAbnNumber, paymentMethod]
      properties:
        bankName:
          type: string
          enum: ['ANZ', 'CommBank', 'Westpac', 'StGeorge', 'ApplePay', 'NAB', 'PayPal']
        accountNumber:
          type: string
        bsbAbnNumber:
          type: string
          description: "Must be in NNN-NNN format"
        paymentMethod:
          type: string
          enum: ['bank_transfer', 'direct_debit', 'credit_card']

    InvoiceStatsResponse:
      type: object
      required: [total, draft, converted, validated, finalised]
      properties:
        total:
          type: integer
        draft:
          type: integer
        converted:
          type: integer
        validated:
          type: integer
        finalised:
          type: integer

    AutofillInvoiceResponse:
      type: object
      properties:
        invoice:
          type: object
          properties:
            buyerName:
              type: string
              nullable: true
            buyerAbn:
              type: string
              nullable: true
            supplierName:
              type: string
              nullable: true
            supplierAbn:
              type: string
              nullable: true
            issueDate:
              type: string
              format: date
              nullable: true
            paymentDueDate:
              type: string
              format: date
              nullable: true
            itemsList:
              type: array
              items:
                $ref: '#/components/schemas/Item'
            taxRate:
              type: number
              nullable: true
            paymentDetails:
              type: array
              items:
                $ref: '#/components/schemas/PaymentDetails'
            additionalNotes:
              type: string
              nullable: true
        missingFields:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: [high, medium, low]

    BatchResult:
      type: object
      properties:
        invoiceId:
          type: string
        success:
          type: boolean
        status:
          type: string
          description: "Present when success is true"
        error:
          type: string
          description: "Present when success is false"
        message:
          type: string
          description: "Present when success is false"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "Unable to complete"

paths:


  /v1/health:
    get:
      summary: Health check
      description: Returns the current status of the service. No authentication required.
      security: []
      tags: [Health]
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: down
                  reason:
                    type: string
                    example: "Database connection failed"


  /v1/admin/auth/register:
    post:
      summary: Register a new admin user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid email, password (too short/simple), or name (invalid chars)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "The provided password does not meet the required criteria."
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "CONFLICT"
                message: "The provided email address is already registered to another user."

  /v1/admin/auth/login:
    post:
      summary: Login to an existing account
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Incorrect email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "The provided password is incorrect."

  /v1/admin/auth/logout:
    post:
      summary: Logout the current user
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Invalid or missing session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "The provided session token does not refer to a valid logged in user session."


  /v1/admin/user/details:
    get:
      summary: Get current user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Successfully retrieved details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid or missing session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."
    put:
      summary: Update user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        '200':
          description: Details updated successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid name or email format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "The provided email address is not in a valid format."
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."
        '409':
          description: Email already taken by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "CONFLICT"
                message: "The provided email address is already registered to another user."

  /v2/admin/user/details:
    get:
      summary: Get current user details (v2)
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Successfully retrieved details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid or missing session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."
    put:
      summary: Update user details (v2)
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        '200':
          description: Details updated successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid name or email format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "The provided email address is not in a valid format."
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."
        '409':
          description: Email already taken by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "CONFLICT"
                message: "The provided email address is already registered to another user."

  /v1/admin/user/password:
    put:
      summary: Update user password
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Incorrect old password, or new password is same as old / invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "The old password provided is incorrect."
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."


  /v1/invoice/autofill:
    post:
      summary: AI autofill invoice data from raw text or partial data
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rawText:
                  type: string
                  description: "Raw unstructured text to extract invoice data from"
                partial:
                  type: object
                  description: "Partially filled invoice fields to merge and complete"
      responses:
        '200':
          description: Autofill result with extracted invoice data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutofillInvoiceResponse'
        '400':
          description: Neither rawText nor partial provided, or invalid field types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "Provide at least one of rawText or partial with content."
        '401':
          description: Invalid or missing API key or session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid or missing API key."
        '500':
          description: AI model error or JSON parse failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_SERVER_ERROR"
                message: "Failed to parse AI response as JSON."

  /v1/invoice:
    post:
      summary: Create a new invoice
      description: Creates a new invoice from manually entered data in draft status.
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buyerName
                - buyerAbn
                - supplierName
                - supplierAbn
                - issueDate
                - paymentDueDate
                - itemsList
                - taxRate
                - paymentDetails
              properties:
                buyerName:
                  type: string
                buyerAbn:
                  type: string
                buyerEmail:
                  type: string
                  format: email
                supplierName:
                  type: string
                supplierAbn:
                  type: string
                issueDate:
                  type: string
                  format: date
                paymentDueDate:
                  type: string
                  format: date
                itemsList:
                  type: array
                  items:
                    $ref: '#/components/schemas/Item'
                taxRate:
                  type: number
                  description: "Decimal value e.g. 0.1 for 10% GST"
                paymentDetails:
                  type: array
                  items:
                    $ref: '#/components/schemas/PaymentDetails'
                additionalNotes:
                  type: string
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: draft
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "Missing or Invalid Fields"
        '401':
          description: Invalid or missing API key or session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid or missing API key."
        '422':
          description: Inconsistent totals or insufficient data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INSUFFICIENT_DATA"
                message: "Invoice totals are inconsistent. Item totals must equal quantity * unitPrice."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_SERVER_ERROR"
                message: "Unexpected error on the server side."

    get:
      summary: List invoices
      description: Returns a paginated list of the authenticated user's invoices with optional date filters.
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: query
          name: fromDate
          schema:
            type: string
            format: date
          description: "Filter invoices created on or after this date"
        - in: query
          name: toDate
          schema:
            type: string
            format: date
          description: "Filter invoices created on or before this date"
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limitPerPage
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      type: object
                      properties:
                        invoiceId:
                          type: string
                        buyerName:
                          type: string
                        status:
                          $ref: '#/components/schemas/InvoiceStatus'
                        createdAt:
                          type: string
                          format: date-time
                        totalPayable:
                          type: number
                  total:
                    type: integer
                  page:
                    type: integer
        '400':
          description: Invalid filter values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "Missing or Invalid Fields"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."

  /v1/invoice/bulk:
    post:
      summary: Bulk create invoices
      description: Creates multiple invoices in a single request. All invoices are validated before any are saved.
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoices]
              properties:
                invoices:
                  type: array
                  items:
                    type: object
                    required:
                      - buyerName
                      - buyerAbn
                      - supplierName
                      - supplierAbn
                      - issueDate
                      - paymentDueDate
                      - itemsList
                      - taxRate
                      - paymentDetails
                    properties:
                      buyerName:
                        type: string
                      buyerAbn:
                        type: string
                      buyerEmail:
                        type: string
                        format: email
                      supplierName:
                        type: string
                      supplierAbn:
                        type: string
                      issueDate:
                        type: string
                        format: date
                      paymentDueDate:
                        type: string
                        format: date
                      itemsList:
                        type: array
                        items:
                          $ref: '#/components/schemas/Item'
                      taxRate:
                        type: number
                      paymentDetails:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentDetails'
                      additionalNotes:
                        type: string
      responses:
        '201':
          description: All invoices created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
        '400':
          description: Missing or invalid fields in one or more invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "Missing or Invalid Fields"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid or missing API key."
        '422':
          description: Inconsistent totals or insufficient data in one or more invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INSUFFICIENT_DATA"
                message: "Invoice totals are inconsistent."


  /v1/invoices/stats:
    get:
      summary: Get invoice statistics for the current user
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Invoice counts by status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceStatsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "No session token has been provided."

  /v1/invoices/batch/{action}:
    post:
      summary: Batch process invoices
      description: Apply a convert, validate, or finalise action to multiple invoices. Each invoice is processed independently; failures do not block others.
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [convert, validate, finalise]
          description: "Action to apply to all provided invoice IDs"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceIds]
              properties:
                invoiceIds:
                  type: array
                  items:
                    type: string
                  example: ["uuid-1", "uuid-2"]
      responses:
        '200':
          description: Batch processing complete (individual results may contain errors)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/BatchResult'
        '400':
          description: Invalid or missing invoiceIds, or unknown action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INVALID_REQUEST"
                message: "Missing or Invalid Fields"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid or missing API key."

  /v1/invoice/{invoiceId}:
    get:
      summary: Get a specific invoice
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: path
          name: invoiceId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Invalid or missing API key."
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "NOT_FOUND"
                message: "The provided invoice ID does not refer to an existing invoice."

    put:
      summary: Update an invoice
      description: Update fields on a draft invoice using its ID.
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: path
          name: invoiceId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                buyerName:
                  type: string
                buyerAbn:
                  type: string
                supplierName:
                  type: string
                supplierAbn:
                  type: string
                issueDate:
                  type: string
                  format: date
                paymentDueDate:
                  type: string
                  format: date
                itemsList:
                  type: array
                  items:
                    $ref: '#/components/schemas/Item'
                taxRate:
                  type: number
                paymentDetails:
                  type: array
                  items:
