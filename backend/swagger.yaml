openapi: 3.0.0
info:
  title: GitGood Invoice Processing API
  description: >
    A cloud-based REST API for generating, converting, validating, finalising,
    and downloading UBL 2.1 compliant electronic invoices.
  version: 1.0.0

servers:
  - url: http://3.107.81.173:3000 
    description: Production (AWS)

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    SessionHeader:
      in: header
      name: session
      required: true
      schema:
        type: string
      description: Session token returned from login or register

  schemas:
    InvoiceStatus:
      type: string
      enum: ['draft', 'converted', 'validated', 'finalised']
      example: "draft"
      
    Invoice:
      type: object
      required:
        - invoiceId
        - status
        - buyerName
        - buyerAbn
        - buyerEmail
        - supplierName
        - supplierAbn
        - issueDate
        - paymentDueDate
        - itemsList
        - taxRate
        - taxAmount
        - totalPayable
        - paymentDetails
        - createdAt
        - updatedAt
        - statusHistory
      properties:
        invoiceId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        buyerName:
          type: string
        buyerAbn:
          type: string
        buyerEmail:
          type: string
          format: email
        supplierName:
          type: string
        supplierAbn:
          type: string
        issueDate:
          type: string
          format: date
        paymentDueDate:
          type: string
          format: date
        itemsList:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        taxRate:
          type: number
          example: 0.1
        taxAmount:
          type: number
        totalPayable:
          type: number
        paymentDetails:
          type: array
          items:
            $ref: '#/components/schemas/PaymentDetails'
        additionalNotes:
          type: string
          nullable: true
        ublXml:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        finalisedAt:
          type: string
          format: date
          nullable: true
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistoryEntry'
          
    StatusHistoryEntry:
      type: object
      required: [status, changedAt]
      properties:
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        changedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    Item:
      type: object
      required: [itemName, quantity, unitPrice, unitCode, totalPrice]
      properties:
        itemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        unitCode:
          type: string
        totalPrice:
          type: number

    PaymentDetails:
      type: object
      required: [bankName, accountNumber, bsbAbnNumber, paymentMethod]
      properties:
        bankName:
          type: string
          enum: ['ANZ', 'CommBank', 'Westpac', 'StGeorge', 'ApplePay', 'NAB', 'PayPal']
        accountNumber:
          type: string
        bsbAbnNumber:
          type: string
        paymentMethod:
          type: string
          enum: ['bank_transfer', 'direct_debit', 'credit_card']

    InvoiceStatsResponse:
      type: object
      required: [total, draft, converted, validated, finalised]
      properties:
        total: { type: integer }
        draft: { type: integer }
        converted: { type: integer }
        validated: { type: integer }
        finalised: { type: integer }

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

paths:
  /v1/health:
    get:
      summary: Health check
      security: []
      tags: [Health]
      responses:
        '200':
          description: Service is running

  /v1/admin/auth/register:
    post:
      summary: Register a new admin user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        '200':
          description: Registration successful

  /v1/admin/auth/login:
    post:
      summary: Login to an existing account
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful

  /v1/admin/auth/logout:
    post:
      summary: Logout the current user
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Logout successful

  /v1/admin/user/details:
    get:
      summary: Get current user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Success
    put:
      summary: Update user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                name: { type: string }
      responses:
        '200':
          description: Updated
          
  /v2/admin/user/details:
    get:
      summary: Get current user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Success
    put:
      summary: Update user details
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                name: { type: string }
      responses:
        '200':
          description: Updated

  /v1/admin/user/password:
    put:
      summary: Update user password
      tags: [User]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200':
          description: Updated

  /v1/invoice:
    post:
      summary: Create a new invoice
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invoice'
      responses:
        '201':
          description: Created
    get:
      summary: List all invoices
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limitPerPage
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Success

  /v1/invoice/autofill:
    post:
      summary: AI Autofill invoice data
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Success

  /v1/invoice/bulk:
    post:
      summary: Bulk create invoices
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoices]
              properties:
                invoices:
                  type: array
                  items:
                    $ref: '#/components/schemas/Invoice'
      responses:
        '201':
          description: Created

  /v1/invoices/batch/{action}:
    post:
      summary: Batch process invoices
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [convert, validate, finalise]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceIds]
              properties:
                invoiceIds:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Success

  /v1/invoice/{invoiceId}:
    get:
      summary: Get a specific invoice
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
    put:
      summary: Update an invoice
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Invoice' }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete an invoice
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted

  /v1/invoice/{invoiceId}/history:
    get:
      summary: Get invoice status history
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId: { type: string }
                  statusHistory:
                    type: array
                    items: { $ref: '#/components/schemas/StatusHistoryEntry' }

  /v1/invoice/{invoiceId}/convert:
    post:
      summary: Convert invoice to UBL XML
      tags: [Invoice Conversion]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Converted
  /v2/invoice/{invoiceId}/convert:
    post:
      summary: Convert invoice to UBL XML
      tags: [Invoice Conversion]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Converted
  /v1/invoice/{invoiceId}/validate:
    post:
      summary: Validate an invoice
      tags: [Invoice Validation]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success

  /v1/invoice/{invoiceId}/final:
    post:
      summary: Finalise a validated invoice
      tags: [Invoice Finalisation]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Finalised

  /v1/invoice/{invoiceId}/download:
    get:
      summary: Download a finalised invoice
      tags: [Invoice Download]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
        - in: query
          name: format
          schema: { type: string, enum: [xml, json], default: xml }
      responses:
        '200':
          description: Success

  /v1/invoice/{invoiceId}/summary:
    get:
      summary: Get invoice summary
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success

  /v1/invoices/stats:
    get:
      summary: Get user invoice statistics
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceStatsResponse' }

  /v1/invoice/{invoiceId}/send:
    post:
      summary: Send invoice via email
      tags: [Invoice Management]
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                recipientEmail: { type: string, format: email }
      responses:
        '200':
          description: Sent

  /v2/invoice:
    get:
      summary: List invoices (v2)
      tags: [Invoice Management]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/InvoiceStatus' }
        - in: query
          name: minAmount
          schema: { type: number }
        - in: query
          name: maxAmount
          schema: { type: number }
        - in: query
          name: buyerName
          schema: { type: string }
        - in: query
          name: supplierName
          schema: { type: string }
      responses:
        '200':
          description: Success
    post:
      summary: Create invoice (v2)
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      responses:
        '201':
          description: Created

  /v2/invoice/bulk:
    post:
      summary: Bulk create (v2)
      tags: [Invoice Creation]
      parameters:
        - $ref: '#/components/parameters/SessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoices]
              properties:
                invoices:
                  type: array
                  items: { $ref: '#/components/schemas/Invoice' }
      responses:
        '201':
          description: Created