name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run tsc

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          API_KEY: test-key
          AWS_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          DYNAMODB_TABLE_NAME: invoices-test
          S3_BUCKET_NAME: invoices-test