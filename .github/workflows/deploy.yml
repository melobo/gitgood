name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/gitgood
            git pull origin main
            
            # Backend
            cd backend
            npm install
            pm2 restart gitgood-api
            
            # Frontend  
            cd ../frontend
            npm install
            npm run build